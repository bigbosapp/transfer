<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appsweb</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>
<body>

    <button class="restart-btn" onclick="restartApp()" title="Reset Aplikasi">↻</button>

    <div class="container">
        <div class="header-container">
            <div class="header-title"><h1>Apps Web</h1></div>
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" id="searchInput" placeholder="Cari di semua folder..." oninput="onSearchInput(this.value)">
            </div>
        </div>

        <div class="breadcrumb-container" id="breadcrumbNav"></div>

        <h5 id="lblFolder" class="section-label" style="display: none;">Folder</h5>
        <div class="file-grid" id="folderContainer"></div>

        <h5 id="lblFile" class="section-label" style="display: none;">File</h5>
        <div class="file-grid" id="fileContainer"></div>
    </div>

    <div id="statusToast" class="status-toast hide">
        <span id="statusToastText">Loading ...</span>
    </div>

    <div id="centerStatusMsg" class="status-msg" style="display: none;"></div>

    <div id="floatingWidget" class="floating-widget">
        <div class="fw-header">
            <span class="fw-title">Proses...</span>
            <div>
                <button class="fw-btn-toggle-log" onclick="toggleFwLog()">Log</button>
                <button class="fw-close" onclick="cancelBackup()" title="Batal">×</button>
            </div>
        </div>
        <div class="fw-progress-bg"><div class="fw-progress-fill" id="fwBar"></div></div>
        <div class="fw-status" id="fwStatus">Menyiapkan...</div>
        <div id="fwLog" class="fw-log"></div>
        <button id="fwBtnSave" class="fw-btn-save" onclick="saveFinalZip()">💾 DOWNLOAD </button>
    </div>

    <div class="modal-overlay" id="imageModal" onclick="closePreview(event)">
        <div class="modal-content">
            <button class="close-btn-abs" onclick="closePreview(event)">×</button>
            <img src="" alt="Preview" id="previewImage" class="modal-image">
            <div class="modal-caption" id="previewCaption">Nama </div>
            <a href="#" id="previewDownload" class="modal-download">Download Gambar</a>
        </div>
    </div>

    <div class="modal-overlay" id="detailsModal" onclick="closeModal('detailsModal', event)">
        <div class="modal-box modal-detail-layout">
            <button class="close-btn-rel" onclick="closeModal('detailsModal', event)">×</button>
            <h3 class="modal-title">Info File</h3>
            
            <div class="detail-scroll-area">
                <div class="detail-group">
                    <span class="detail-label">Nama </span>
                    <span class="detail-value" id="detailName">-</span>
                </div>
                <div class="detail-group">
                    <span class="detail-label">Di Upload</span>
                    <span class="detail-value" id="detailDate">-</span>
                </div>
                <div class="detail-group">
                    <span class="detail-label">Lokasi Folder</span>
                    <span class="detail-value" id="detailLocation">-</span>
                </div>
                
                <div class="detail-group" id="expiryGroup" style="display: none;">
                    <span class="detail-label" style="color: var(--danger);">Kadaluarsa dalam 48 Jam</span>
                    <span class="detail-value expiry-alert" id="expiryTimer"></span>
                </div>

                <div class="detail-group" id="detailCountGroup" style="display: none;">
                    <span class="detail-label">Isi</span>
                    <span class="detail-value" id="detailCount" style="color: var(--success); font-weight:600;">-</span>
                </div>
            </div>
            
            <div id="folderBackupContainer" class="modal-footer-action"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
